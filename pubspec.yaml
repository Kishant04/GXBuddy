name: gxbuddy
description: GXBuddy — Your Smart Financial Companion That Thinks Before You Spend
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.0

  # HTTP client
  dio: ^5.4.3+1

  # WebSocket
  web_socket_channel: ^3.0.1

  # Formatting
  intl: ^0.19.0

  # Fonts
  google_fonts: ^6.2.1

  # Local prefs
  shared_preferences: ^2.3.0

  # UI helpers
  flutter_animate: ^4.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.3

flutter:
  uses-material-design: true
